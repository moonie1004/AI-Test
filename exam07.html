<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image:url('dog.jpg');
        }
        ol{list-style-type:none;}
   

    li{
        float:left;
        padding: 5px;  
    }
    li:nth-child(2n){
        background-color:yellow;
    }
    li:nth-child(2n+1){
        background-color:orange;
    }
    li:nth-child{
        border-radius: 25% 0 0 25%;
    }

    <div:hover{
        background-color:blue;
        border-radius:50%;
    }

</div>  </style>
</head>
<body>
    <h1>Hello</h1>
    <div>
        <h1{
            font-size:25pt;
        }/h1>
    </div>
    <div></div>
    <ol>
        <li>첫번째</li>
        <li>두번째</li>
        <li>세번째</li>
        <li>네번째</li>
        <li>다섯번째</li>
        <li>여섯번째</li>
        <li>일곱번째</li>
    </ol>

    
</body>
</html>
